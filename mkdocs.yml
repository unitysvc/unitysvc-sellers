site_name: UnitySVC Seller SDK
site_description: Python SDK and CLI for the UnitySVC seller API
site_author: UnitySVC Team
site_url: https://unitysvc-sellers.readthedocs.io

repo_name: unitysvc/unitysvc-sellers
repo_url: https://github.com/unitysvc/unitysvc-sellers
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_category_heading: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html

# Structure per DOCS_REORG_PLAN.md. Phases 1–2 (Home, Concepts, Guides) are
# rewritten; Phase 3 (Reference de-stale) is in progress.
nav:
  - Home: index.md
  - Get Started:
      - Quick Start: getting-started.md
  - Concepts:
      - Services: services.md
      - Service Types: service-types.md
      - Service Templates: service-templates.md
      - Pricing: pricing.md
      - Names & Routing: naming-conventions.md
      - After You Publish: seller-lifecycle.md
  - Guides:
      - Author & Upload Specs: guides/author-specs.md
      - Compact Specs with Param Files: guides/param-files.md
      - Create from a Template: guides/create-from-template.md
      - Generate a Catalog: guides/generate-catalog.md
      - Document Services: documenting-services.md
      - Test Services: code-examples.md
      - Operate Live Services: guides/operate-services.md
      - Promotions, Groups & Secrets: guides/catalog-extras.md
  - Reference:
      - CLI Reference: cli-reference.md
      - SDK Guide: sdk-guide.md
      - SDK Reference: sdk-reference.md
      - File Schemas: file-schemas.md
  - Advanced:
      - User Access Interface Templates: tech-notes/user-access-interface-template.md
      - Claude Code Skill: claude-code-skill.md

# Design notes — versioned with the code, not part of the published site.
not_in_nav: |
  /dev-notes/*.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/unitysvc/unitysvc-sellers
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/unitysvc-sellers/

